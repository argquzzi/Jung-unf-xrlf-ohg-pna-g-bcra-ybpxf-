<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>...</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }

        #result {
            margin-top: 15px;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        .container {
            text-align: center;
        }

        audio {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="answer" placeholder="Answer">
        <div id="result"></div>
    </div>

    <script>
        document.getElementById("answer").addEventListener("keydown", function(event) {
            if (event.key === "Enter" && this.value.trim().toLowerCase() === "piano") {

                const result = document.getElementById("result");
                result.innerHTML = "";

                const audio = document.createElement("audio");
                audio.src = "./samsung.wav";
                audio.controls = true;
                audio.autoplay = true;

                result.appendChild(audio);
            }
        });
    </script>
</body>
</html>
